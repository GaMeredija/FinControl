services:
  postgres:
    image: postgres:16-alpine
    container_name: fincontrol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fincontrol
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - fincontrol-postgres-data:/var/lib/postgresql/data

volumes:
  fincontrol-postgres-data:
